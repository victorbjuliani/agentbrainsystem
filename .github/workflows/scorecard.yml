# OpenSSF Scorecard — continuous supply-chain security posture score.
# Runs 18+ checks (branch protection, pinned deps, token permissions, dangerous
# workflow patterns, etc.) and publishes the result to the OpenSSF API so the
# README badge stays live. Findings land in the repo Security tab via SARIF.
# Public repo → GitHub code scanning is free, no extra setup needed.
name: Scorecard

on:
  # Re-score whenever branch protection changes — that's a Scorecard input.
  branch_protection_rule:
  schedule:
    - cron: "21 6 * * 1" # Mondays 06:21 UTC (off the top-of-hour stampede)
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege by default; the job below widens only what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to the Security tab
      id-token: write # publish_results -> OpenSSF API (enables the badge)
    steps:
      - name: Harden the runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes the score to the public OpenSSF dashboard so the badge works.
          # Safe for public repos; flip to false to keep results private.
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: results.sarif
