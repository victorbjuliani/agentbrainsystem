# Cross-OS release build for the Tauri tray companion (DESIGN §12, src-tauri/).
# Tag-triggered ONLY — kept out of ci.yml so every PR stays a fast Node check and
# never pays the (slow) 3-OS Rust compile. Push a `v*` tag (or run by hand) to cut
# installers for macOS (arm + intel), Windows, and Linux.
name: release-companion

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      # Audit mode; full egress monitoring is Linux-only, a graceful no-op on
      # the macOS/Windows matrix legs.
      - name: Harden the runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@v4

      - name: Install Linux system deps (webkit2gtk + tray)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            libssl-dev \
            libgtk-3-dev

      # Use the rustup that GitHub-hosted runners ship with, rather than the
      # dtolnay/rust-toolchain action: that action is pinned to a branch-SHA and its
      # codeload tarball intermittently fails to download on the runners ("could not be
      # found at the URI … after 1 attempts"), which blocks the whole matrix. rustup is
      # already on PATH on every runner, so this is both resilient and equivalent.
      # $RUNNER_OS is a built-in (Linux/Windows/macOS) — no untrusted input in run:.
      - name: Set up Rust toolchain + targets
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          if [ "$RUNNER_OS" = "macOS" ]; then
            rustup target add aarch64-apple-darwin x86_64-apple-darwin
          fi
          rustc --version

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # The companion's frontend (src-tauri/ui) is static — no JS build step needed.
      # tauri-action derives the tag + release name from tauri.conf.json version
      # (app-v__VERSION__), so no run: step ever touches a git ref.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: app-v__VERSION__
          releaseName: "agentbrainsystem companion v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
