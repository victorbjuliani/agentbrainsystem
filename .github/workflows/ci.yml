name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly (06:00 UTC) so the heavier Playwright UI suite can't rot silently
    # between main pushes — see the `e2e-ui` job (#113).
    - cron: "0 6 * * *"

# Least privilege: every job here only reads the repo to build and test.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - name: Assert UI bundle is packaged
        run: npm pack --dry-run --json > /tmp/pack.json && node -e "const f=require('/tmp/pack.json'); const files=(f[0]?.files||[]).map(x=>x.path); if(!files.some(p=>p.endsWith('dist/ui/static/app.js'))) { console.error('UI bundle missing from package'); process.exit(1) }"
      # Persist the transformers.js model cache across runs so the vitest global
      # setup warms from cache instead of re-downloading MiniLM every run (#154).
      # Restored AFTER `npm ci` (which would otherwise wipe node_modules).
      - name: Cache embedding model
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules/@huggingface/transformers/.cache
          key: ${{ runner.os }}-hf-minilm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-hf-minilm-
      - run: npm test

  # Headless system E2E (CLI / MCP stdio / hooks / ingest / optimize / delete).
  # Runs on EVERY PR: it's fast (~10-20s + a one-time ~35s first-run model
  # download) and it is what would have caught the #92 install-hooks regression
  # that rotted unnoticed because the suite never ran in CI (#113). The
  # vitest-e2e run downloads the local embedding model from the network; that
  # download is now cached across runs (#154), so only a cold cache pays the ~35s.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Cache embedding model
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules/@huggingface/transformers/.cache
          key: ${{ runner.os }}-hf-minilm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-hf-minilm-
      - run: npm run test:e2e:vitest

  # Playwright UI / creature E2E. Heavier (browser download + render), and the UI
  # is outside the backend's hot path, so it does NOT gate every PR — it runs on
  # main pushes, the nightly schedule, and manual dispatch (#113). PRs that change
  # the UI can trigger it via the Actions "Run workflow" button.
  e2e-ui:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:pw

  # Compile-check the Rust tray companion (src-tauri/). It cannot be built locally
  # (crates.io is unreachable behind the dev proxy), and release.yml only builds it on
  # a `v*` tag — so without this PR job a tray change (e.g. #161 sidecar lifecycle) has
  # NO compile verification before release. `cargo check` is the cheap pre-release gate.
  tray-check:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (audit mode)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install Linux system deps (webkit2gtk + tray)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            libssl-dev \
            libgtk-3-dev
      # rustup ships on every GitHub-hosted runner — resilient + equivalent to the
      # dtolnay action (mirrors release.yml's rationale).
      - name: Set up Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version
      - name: Cache cargo
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      - name: cargo check (tray)
        working-directory: src-tauri
        run: cargo check
