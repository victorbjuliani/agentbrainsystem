name: Feature
description: A new capability or substantial enhancement.
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user-facing problem does this solve? Who feels it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should the system do?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Given / When / Then bullets that define "done".
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What this issue explicitly does NOT cover.
  - type: input
    id: depends-on
    attributes:
      label: Depends on
      description: Other issues that must land first (e.g. "#3").
