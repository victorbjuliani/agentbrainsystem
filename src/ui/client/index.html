<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0810" />
    <meta name="color-scheme" content="dark light" />
    <!-- Per-process CSRF token for the delete write path (ADR-0007). The UI server
         substitutes __ABS_CSRF__ at request time when serving `/`; the client reads
         it from this meta tag and echoes it in X-ABS-CSRF on delete calls. The build
         copies this file verbatim — the placeholder is only ever replaced server-side. -->
    <meta name="abs-csrf" content="__ABS_CSRF__" />
    <title>agentbrainsystem — memory graph</title>
    <!-- Assets are served under /static/ by the UI server; reference them there so
         index.html (served at /) loads them correctly. -->
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main id="app">
      <!-- The hero: full-bleed force-graph canvas (DESIGN §0 / §11). -->
      <div id="graph" role="img" aria-label="Grafo interativo da memória do agente"></div>
      <!-- Floating chrome lives here; built by overlays.ts (never an opaque top-bar).
           The on-brand empty/no-results states (DESIGN §11) are created inside overlays.ts. -->
      <div id="overlays"></div>
      <p id="error-banner" class="error-banner" role="alert" hidden></p>
      <!-- Positive outcomes (e.g. a successful delete) go here, announced politely so
           they never interrupt; the error banner above is the assertive channel. -->
      <p id="status-banner" class="status-banner" role="status" aria-live="polite" hidden></p>
    </main>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
