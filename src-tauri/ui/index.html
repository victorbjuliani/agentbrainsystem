<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0810" />
    <title>agentbrainsystem</title>
    <style>
      /* Tray popover — bioluminescent deep-ocean (DESIGN §4/§8/§11/§12 form factor A).
         The hero is a tiny LIVING jellyfish, not a glowing orb: a translucent dome that
         breathes + drifting tentacles. Brand fonts are bundled (offline-first, §5):
         Space Grotesk for the glanceable numbers, JetBrains Mono for the technical layer. */

      @font-face {
        font-family: "Space Grotesk";
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url("fonts/space-grotesk-latin-500-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "Space Grotesk";
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url("fonts/space-grotesk-latin-700-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("fonts/jetbrains-mono-latin-400-normal.woff2") format("woff2");
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url("fonts/jetbrains-mono-latin-500-normal.woff2") format("woff2");
      }

      :root {
        color-scheme: dark;
        /* Palette — DESIGN §4 (dark-first deep ocean) */
        --neutral-950: #0a0810;
        --neutral-900: #12101b;
        --neutral-800: #1a1825;
        --neutral-700: #2a2838;
        --fg: #fafaf9;
        --fg-muted: #9a95ad;
        --fg-faint: #6e6a82;
        --violet-300: #c4b5fd;
        --violet-400: #a78bfa;
        --violet-500: #8b5cf6;
        --cyan: #22d3ee; /* user beads */
        --lavender: #a78bfa; /* assistant beads */
        --hairline: rgba(255, 255, 255, 0.08); /* luminous hairline (§8) */
        --hairline-violet: rgba(139, 92, 246, 0.32);
        /* Elevation = glow, not shadow, on dark (§8) */
        --glow-md: 0 0 24px -2px rgba(139, 92, 246, 0.45);
        --glow-lg: 0 0 48px -6px rgba(139, 92, 246, 0.5);
        /* Type (§5) */
        --font-display: "Space Grotesk", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", monospace;
        /* Motion (§9) */
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent; /* the window is transparent; the card is the surface */
        color: var(--fg);
        font-family: var(--font-mono);
        -webkit-font-smoothing: antialiased;
        user-select: none;
        cursor: default;
      }

      /* The card IS the popover surface — rounded so the transparent window shows no
         square corners. Radius = popover Large (§8). */
      .card {
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 16px;
        background:
          radial-gradient(135% 80% at 50% -10%, #1b1330 0%, var(--neutral-950) 62%);
        border: 1px solid var(--hairline);
        border-radius: 16px;
        box-shadow: var(--glow-md), inset 0 1px 0 0 rgba(255, 255, 255, 0.04);
        overflow: hidden;
      }

      /* ---- The creature: a tiny living jellyfish (the differentiation anchor) ---- */
      .creature {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 96px;
        margin-top: 2px;
      }
      .jelly {
        width: 92px;
        height: 92px;
        overflow: visible;
        filter: drop-shadow(0 0 14px rgba(139, 92, 246, 0.55));
        transition: filter 400ms var(--ease-out), opacity 400ms var(--ease-out);
      }
      /* Dormant when the memory is empty — faint, low glow (translucidez = confiança §11) */
      body[data-empty="true"] .jelly {
        filter: drop-shadow(0 0 6px rgba(139, 92, 246, 0.25));
        opacity: 0.62;
      }

      .jelly-body {
        transform-box: fill-box;
        transform-origin: center 35%;
        animation: breathe 3.6s ease-in-out infinite;
      }
      .tentacle {
        transform-box: fill-box;
        transform-origin: top center;
        animation: sway 4.2s ease-in-out infinite;
      }
      .tentacle.t2 { animation-duration: 5.1s; animation-delay: -0.8s; }
      .tentacle.t3 { animation-duration: 4.6s; animation-delay: -1.6s; }
      .tentacle.t4 { animation-duration: 5.4s; animation-delay: -2.3s; }
      .tentacle.t5 { animation-duration: 4.0s; animation-delay: -0.4s; }
      .bead {
        animation: shimmer 3s ease-in-out infinite;
      }
      .bead.b2 { animation-delay: -1.1s; }
      .bead.b3 { animation-delay: -2.0s; }

      /* Pulse when the agent learns (ingest delta) — bright flash + swell (§9 #3/#5) */
      .creature.pulse .jelly {
        animation: jelly-pulse 0.9s var(--ease-out);
      }

      @keyframes breathe {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-3px) scale(1.05); }
      }
      @keyframes sway {
        0%, 100% { transform: rotate(-4deg); }
        50% { transform: rotate(4deg); }
      }
      @keyframes shimmer {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
      @keyframes jelly-pulse {
        0% { filter: drop-shadow(0 0 14px rgba(139, 92, 246, 0.55)); transform: scale(1); }
        40% { filter: drop-shadow(0 0 30px rgba(230, 220, 255, 0.95)); transform: scale(1.08); }
        100% { filter: drop-shadow(0 0 14px rgba(139, 92, 246, 0.55)); transform: scale(1); }
      }

      /* ---- Brand line ---- */
      .brand {
        margin: 6px 0 14px;
        text-align: center;
        font-family: var(--font-display);
        font-weight: 500;
        font-size: 14px;
        letter-spacing: 0.01em;
        color: var(--fg);
      }

      /* ---- Stats: two glanceable metrics, big numbers in display face ---- */
      .stats {
        display: grid;
        grid-template-columns: 1fr 1px 1fr;
        align-items: center;
        gap: 0 12px;
        padding: 12px 0;
        border-top: 1px solid var(--hairline);
        border-bottom: 1px solid var(--hairline);
      }
      .metric {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }
      .metric .num {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 28px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        color: var(--fg);
      }
      .metric .label {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--fg-muted);
      }
      .divider {
        width: 1px;
        height: 30px;
        background: var(--hairline);
      }

      /* ---- Last-activity / empty line ---- */
      .ts {
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        padding: 10px 4px;
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 1.4;
        color: var(--fg-faint);
        text-align: center;
        word-break: break-word;
      }

      /* ---- Open-ocean button (all 8 states) ---- */
      .open {
        flex: 0 0 auto;
        width: 100%;
        padding: 10px 12px;
        font-family: var(--font-mono);
        font-weight: 500;
        font-size: 12px;
        letter-spacing: 0.02em;
        color: var(--fg);
        background: color-mix(in oklab, var(--violet-500) 20%, var(--neutral-800));
        border: 1px solid var(--hairline-violet);
        border-radius: 10px;
        cursor: pointer;
        transition:
          background-color 150ms var(--ease-out),
          border-color 150ms var(--ease-out),
          transform 150ms var(--ease-out),
          box-shadow 150ms var(--ease-out);
      }
      @media (hover: hover) and (pointer: fine) {
        .open:hover {
          background: color-mix(in oklab, var(--violet-500) 34%, var(--neutral-800));
          border-color: var(--violet-500);
          box-shadow: var(--glow-md);
        }
      }
      .open:focus-visible {
        outline: 2px solid var(--violet-500);
        outline-offset: 2px;
      }
      .open:active {
        transform: scale(0.985);
      }
      .open[aria-disabled="true"] {
        opacity: 0.55;
        cursor: progress;
      }

      @media (prefers-reduced-motion: reduce) {
        .jelly-body,
        .tentacle,
        .bead,
        .creature.pulse .jelly {
          animation: none;
        }
      }
    </style>
  </head>
  <body data-empty="true">
    <main class="card">
      <div class="creature" id="creature">
        <!-- Compact emblem of the immersive creature (§12 A): translucent dome that
             breathes + tentacles that drift. Decorative beads echo user/assistant hues. -->
        <svg class="jelly" viewBox="0 0 92 92" role="img" aria-label="agentbrainsystem">
          <defs>
            <radialGradient id="dome" cx="50%" cy="32%" r="62%">
              <stop offset="0%" stop-color="#f1ebff" stop-opacity="0.95" />
              <stop offset="32%" stop-color="#c4b5fd" stop-opacity="0.85" />
              <stop offset="70%" stop-color="#8b5cf6" stop-opacity="0.55" />
              <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.12" />
            </radialGradient>
            <linearGradient id="tent" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.85" />
              <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.05" />
            </linearGradient>
          </defs>
          <g class="jelly-body">
            <!-- Tentacles drift below the bell, each desynchronized -->
            <g stroke="url(#tent)" stroke-width="2.2" stroke-linecap="round" fill="none">
              <path class="tentacle t1" d="M34 42 C 32 54, 36 62, 33 74" />
              <path class="tentacle t2" d="M40 44 C 39 56, 42 66, 40 80" />
              <path class="tentacle t3" d="M46 45 C 46 58, 46 68, 46 82" />
              <path class="tentacle t4" d="M52 44 C 53 56, 50 66, 52 80" />
              <path class="tentacle t5" d="M58 42 C 60 54, 56 62, 59 74" />
            </g>
            <!-- Light beads on the tentacles (user cyan / assistant lavender) -->
            <circle class="bead b1" cx="33" cy="60" r="1.8" fill="var(--cyan)" />
            <circle class="bead b2" cx="46" cy="66" r="1.8" fill="var(--lavender)" />
            <circle class="bead b3" cx="59" cy="58" r="1.8" fill="var(--cyan)" />
            <!-- The bell -->
            <path
              d="M22 40 C 22 22, 38 13, 46 13 C 54 13, 70 22, 70 40 C 70 44, 64 46, 58 44 C 54 43, 50 45, 46 45 C 42 45, 38 43, 34 44 C 28 46, 22 44, 22 40 Z"
              fill="url(#dome)"
            />
            <!-- Neural-mesh shimmer hint on the dome -->
            <g fill="#f1ebff" opacity="0.55">
              <circle cx="40" cy="26" r="0.9" />
              <circle cx="50" cy="23" r="0.9" />
              <circle cx="46" cy="32" r="0.9" />
            </g>
          </g>
        </svg>
      </div>

      <p class="brand" translate="no">agentbrainsystem</p>

      <section class="stats" aria-label="memory">
        <div class="metric">
          <span class="num" id="obs">—</span>
          <span class="label" data-i18n="observations">observations</span>
        </div>
        <div class="divider" aria-hidden="true"></div>
        <div class="metric">
          <span class="num" id="sessions">—</span>
          <span class="label" data-i18n="sessions">sessions</span>
        </div>
      </section>

      <p class="ts" id="ts"></p>

      <button class="open" id="open" type="button" data-i18n="openOcean">open ocean</button>
    </main>
    <script src="popover.js"></script>
  </body>
</html>
